<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safe Send — Login</title>
  <link rel="stylesheet" href="css/common.css"/>
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body>
  <div class="login-container">
    <div class="tab-buttons">
      <button id="signinTab" class="active" type="button">Sign In</button>
      <button id="signupTab" type="button">Sign Up</button>
    </div>

    <!-- ===== Sign In ===== -->
    <form id="signinForm" class="form active" novalidate>
      <input type="email" id="signinEmail" placeholder="Email" required />
      <input type="password" id="signinPassword" placeholder="Password" required />
      <button type="submit" id="signinBtn">Login</button>
      <p id="signinMessage" class="message"></p>
    </form>

    <!-- ===== Sign Up ===== -->
    <form id="signupForm" class="form" novalidate>
      <input type="text" id="signupName" placeholder="Name" required />
      <input type="email" id="signupEmail" placeholder="Email" required />
      <input type="password" id="signupPassword" placeholder="Password" required />
      <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required />
      <button type="submit" id="signupSubmit">Register</button>
      <p id="signupMessage" class="message"></p>
    </form>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
