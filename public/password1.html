<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Protect - Sender</title>
  <link rel="stylesheet" href="css/password1.css">
</head>
<body>
  <div class="container">
    <h2>🔐 Secure File Upload</h2>
    <p class="subtitle">Protect your file with a strong password</p>

    <!-- File Upload -->
    <div class="input-group">
      <label for="fileInput">Choose File</label>
      <input type="file" id="fileInput" />
    </div>

    <!-- Password Setup -->
    <div class="input-group">
      <label for="passwordInput">Set Password</label>
      <input type="password" id="passwordInput" placeholder="Enter a strong password" />
      <div id="strengthMessage" class="strength"></div>
    </div>

    <!-- Optional Password Hint -->
    <div class="input-group">
      <label for="hintInput">Password Hint (Optional)</label>
      <input type="text" id="hintInput" placeholder="e.g. My favorite color" />
    </div>

    <!-- Submit -->
    <button id="uploadBtn">🚀 Package Securely</button>

    <div id="uploadStatus"></div>
  </div>

  <script src="js/password1.js"></script>
</body>
</html>
