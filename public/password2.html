<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Protect - Receiver</title>
  <link rel="stylesheet" href="css/password2.css">
</head>
<body>
  <div class="container">
    <h2>🔓 Access Secure File</h2>
    <p class="subtitle">Upload the secure package and enter the password</p>

    <!-- Upload JSON package -->
    <div class="input-group">
      <label for="packageInput">Upload Package (.json)</label>
      <input type="file" id="packageInput" accept=".json" />
    </div>

    <!-- Password Entry -->
    <div class="input-group">
      <label for="passwordInput">Enter Password</label>
      <input type="password" id="passwordInput" placeholder="Enter password" />
    </div>

    <!-- Optional Hint -->
    <div id="hintSection"></div>

    <!-- Submit -->
    <button id="accessBtn">🔑 Unlock & Download</button>

    <div id="accessStatus"></div>
  </div>

  <script src="js/password2.js"></script>
</body>
</html>
